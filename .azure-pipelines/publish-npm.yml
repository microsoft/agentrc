trigger:
    batch: true
    branches:
        include:
            - main
pr: none

resources:
    repositories:
        - repository: templates
          type: github
          name: microsoft/vscode-engineering
          ref: main
          endpoint: Monaco

parameters:
    - name: nextVersion
      displayName: "🚀 Release Version (eg: none, major, minor, patch, prerelease, or X.X.X)"
      type: string
      default: "none"

name: "$(Date:yyyyMMdd).$(Rev:r)${{ replace(format(' (🚀 {0})', parameters.nextVersion), ' (🚀 none)', '') }}"

extends:
    template: azure-pipelines/npm-package/pipeline.yml@templates
    parameters:
        npmPackages:
            - name: agentrc
              buildSteps:
                  - task: NodeTool@0
                    inputs:
                        versionSpec: 22.x
                    displayName: 🛠 Install Node.js (22.x)

                  - script: npm ci
                    displayName: 📦 Install dependencies

                  - script: npm run build
                    displayName: 🔨 Build
              testPlatforms:
                  - name: Linux
                    nodeVersions: [22.x]
                  - name: MacOS
                    nodeVersions: [22.x]
                  - name: Windows
                    nodeVersions: [22.x]
              testSteps:
                  - script: npm ci
                    displayName: 📦 Install dependencies

                  - script: npm run build
                    displayName: 🔨 Build

                  - script: npm test
                    displayName: 🧪 Run tests
              ${{ if eq(parameters.nextVersion, 'none') }}:
                  publishPackage: false
              ${{ elseif eq(parameters.nextVersion, 'prerelease') }}:
                  publishPackage: true
                  publishRequiresApproval: false
                  nextVersion: prerelease
                  tag: next
              ${{ else }}:
                  publishPackage: true
                  nextVersion: ${{ parameters.nextVersion }}
              ghCreateRelease: true
              ghReleaseAddChangeLog: true
