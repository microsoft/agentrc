version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
  - package-ecosystem: npm
    directory: /vscode-extension
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # lock.yml files are managed by 'gh aw compile' — Dependabot must not
      # update gh-aw action pins directly.
      - dependency-name: "github/gh-aw-actions/*"
      - dependency-name: "github/gh-aw/*"
